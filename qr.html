<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descargar Open</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #123b2f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    p {
      color: #333;
      font-size: 16px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Redirigiendo a tu tienda...</p>
  </div>

  <script>
    function detectOSAndRedirect() {
      const ua = navigator.userAgent || navigator.vendor || window.opera;
      
      if (/android/i.test(ua)) {
        window.location.href = "https://play.google.com/store/apps/details?id=com.open1x.app";
      } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        window.location.href = "https://apps.apple.com/co/app/open-servicios-cerca-de-ti/id6769672984";
      } else {
        // Si es desktop, mostrar página de opciones
        window.location.href = "download.html";
      }
    }

    // Ejecutar redirección inmediatamente al cargar
    window.addEventListener('DOMContentLoaded', detectOSAndRedirect);
    
    // Fallback por si DOMContentLoaded no se dispara
    setTimeout(detectOSAndRedirect, 100);
  </script>
</body>
</html>
