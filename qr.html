<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Descargar Open</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e0e0e0;
      border-top: 4px solid #123b2f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    p {
      color: #333;
      font-size: 16px;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Redirigiendo a tu tienda...</p>
  </div>

  <script>
    function detectOSAndRedirect() {
      const ua = navigator.userAgent.toLowerCase();
      
      console.log('User Agent:', ua);
      
      // Detectar Android
      if (ua.indexOf('android') > -1) {
        console.log('Android detectado, redirigiendo...');
        window.location.replace("https://play.google.com/store/apps/details?id=com.open1x.app");
        return;
      }
      
      // Detectar iOS con múltiples métodos
      if (/iphone|ipad|ipod|mac os/.test(ua)) {
        console.log('iOS detectado, redirigiendo...');
        window.location.replace("https://apps.apple.com/co/app/open-servicios-cerca-de-ti/id6769672984");
        return;
      }
      
      // Si es desktop, ir a download.html
      console.log('Desktop detectado, mostrando opciones...');
      window.location.replace("download.html");
    }

    // Ejecutar redirección inmediatamente, antes que cualquier otra cosa
    if (document.readyState === 'loading') {
      detectOSAndRedirect();
    }
    
    // También ejecutar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', detectOSAndRedirect);
    
    // Y con un timeout corto como fallback
    setTimeout(detectOSAndRedirect, 50);
  </script>
</body>
</html>
